name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t rsa exe.dev >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pull latest code
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no exe.dev \
            "ssh tagooza 'cd /home/exedev/nabeeh && git fetch origin master && git reset --hard origin/master'"

      - name: Build and deploy backend
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no exe.dev \
            "ssh tagooza 'cd /home/exedev/nabeeh && docker compose -f docker-compose.prod.yml build backend && docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans backend'"

      - name: Wait for backend health
        run: sleep 10

      - name: Build and deploy frontend
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no exe.dev \
            "ssh tagooza 'cd /home/exedev/nabeeh && docker compose -f docker-compose.prod.yml build frontend && docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans frontend'"

      - name: Verify containers
        run: |
          sleep 15
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no exe.dev \
            "ssh tagooza 'docker ps --format \"table {{.Names}}\t{{.Status}}\"'"

      - name: Health check
        run: |
          sleep 5
          curl -sf https://nabeeh.app/api/health || echo "Health check failed"

      - name: Cleanup old Docker images
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no exe.dev \
            "ssh tagooza 'docker image prune -f && docker builder prune -f --keep-storage 500MB'"
